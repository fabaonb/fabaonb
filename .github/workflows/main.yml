name: Auto Commit

"on":
  workflow_dispatch:
  schedule: 
  - cron: 0 16 * * *

permissions:
  contents: write

jobs:
  ac:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4
     - run: |
        git config --local user.email "email"
        git config --local user.name "name"

        count=$((RANDOM % 11))
        echo "当天计划提交次数：$count"

        for i in $(seq 1 $count); do
         echo "$(date +%Y-%m-%d)-$count" > log.txt
         git add log.txt
         git commit --allow-empty -m "$(date +%Y-%m-%d)-$count"
        done

        if [ $count -gt 0 ]; then
          git push
        fi
